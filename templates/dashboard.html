<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Dashboard Assessment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1, h2 {
            color: #222;
        }

        .section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            margin-top: 20px;
            background: #222;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fitness Assessment</h1>
        <p>Answer these questions so we can create a personalized fitness and nutrition plan for you.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="section">
                <h2>Personal Information</h2>

                <label for="age">Age</label>
                <input type="number" id="age" name="age" required>

                <label for="height">Height (cm)</label>
                <input type="number" id="height" name="height" required>

                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" name="weight" required>
            </div>

            <div class="section">
                <h2>Nutrition Assessment</h2>

                <label for="nutrition">How would you rate your nutrition?</label>
                <select id="nutrition" name="nutrition" required>
                    <option value="">Select</option>
                    <option value="good">Good</option>
                    <option value="medium">Medium</option>
                    <option value="poor">Poor</option>
                </select>

                <label for="meals_per_day">How many meals do you eat per day?</label>
                <select id="meals_per_day" name="meals_per_day" required>
                    <option value="">Select</option>
                    <option value="1-2">1–2</option>
                    <option value="3-4">3–4</option>
                    <option value="5+">5+</option>
                </select>

                <label for="eat_out">How often do you eat out each week?</label>
                <select id="eat_out" name="eat_out" required>
                    <option value="">Select</option>
                    <option value="0">0</option>
                    <option value="1-2">1–2</option>
                    <option value="3-5">3–5</option>
                    <option value="6+">6+</option>
                </select>
            </div>

            <div class="section">
                <h2>Fitness Assessment</h2>

                <label for="active">Are you an active person?</label>
                <select id="active" name="active" required>
                    <option value="">Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <label for="exercise_days">How many days do you exercise per week?</label>
                <select id="exercise_days" name="exercise_days" required>
                    <option value="">Select</option>
                    <option value="0">0</option>
                    <option value="1-2">1–2</option>
                    <option value="3-4">3–4</option>
                    <option value="5+">5+</option>
                </select>

                <label for="goal">What is your main fitness goal?</label>
                <select id="goal" name="goal" required>
                    <option value="">Select</option>
                    <option value="lose_weight">Lose Weight</option>
                    <option value="build_muscle">Build Muscle</option>
                    <option value="maintain_health">Maintain Health</option>
                    <option value="improve_endurance">Improve Endurance</option>
                </select>
            </div>

            <button type="submit">Generate My Plan</button>
        </form>
    </div>
</body>
</html>
